name: PR Title

# A squash merge takes its commit subject from the PR title (for multi-commit
# PRs), so the title — not the individual commits — is what lands on `main`.
# The commit-msg hook (commitlint) only covers local commits; this check is the
# guardrail for the title. Re-runs on `edited` so renaming the title re-validates.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: Conventional Commits title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Mirror commitlint (config-conventional defaults); scope optional.
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            perf
            build
            ci
            style
            revert
          requireScope: false
