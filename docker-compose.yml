services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jesusfilm-rag-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jesusfilm_rag
      POSTGRES_PASSWORD: jesusfilm_rag_dev
      POSTGRES_DB: jesusfilm_rag
    ports:
      # Host 5434 -> container 5432 (non-default host port to avoid local collisions).
      - "5434:5432"
    volumes:
      - jesusfilm-rag-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "jesusfilm_rag", "-d", "jesusfilm_rag"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The read-only /v1 HTTP serving adapter, alongside the RAG it serves.
  # `docker compose up` brings this up once Postgres is healthy — no manual env.
  #
  # NO HOT-RELOAD: the image COPIES the source (see Dockerfile), it is not
  # bind-mounted. Code changes are NOT live in the container until you rebuild:
  #     docker compose up -d --build serve
  # Hot-reload would need a source bind-mount + a node_modules volume + a watch
  # runner (e.g. tsx watch); intentionally omitted (robust, deploy-like image
  # over dev ergonomics). See README → "Serving the /v1 API (Docker)".
  serve:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jesusfilm-rag-serve
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Inside the compose network, reach Postgres by service name — not the
      # host's 5434 mapping.
      DATABASE_URL: postgresql://jesusfilm_rag:jesusfilm_rag_dev@postgres:5432/jesusfilm_rag
      # Pulled from .env via compose substitution — never baked into the image.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set OPENROUTER_API_KEY in .env}
      # Query model MUST match the corpus rows (the retrieval guard throws
      # otherwise). Defaults to the code default (qwen, ADR-0005); override via
      # .env during a model transition.
      EMBED_MODEL_ID: ${EMBED_MODEL_ID:-qwen/qwen3-embedding-8b}
      # Query-side asymmetric instruction (documents embed raw) — qwen quality.
      EMBED_QUERY_INSTRUCTION: ${EMBED_QUERY_INSTRUCTION:-Given a web search query, retrieve relevant passages that answer the query}
      PORT: 8080
      # Dev bearer token → all sources. Change here for a different local token.
      SERVE_BEARER_TOKENS: '{"local-dev-token":["*"]}'
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://localhost:8080/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  jesusfilm-rag-pgdata:
