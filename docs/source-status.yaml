# Source status — the at-a-glance lookup for the *:production scripts.
#
# Open this file, find a row whose `status` is `done`, copy its key, run:
#   pnpm acquire:production  --source <key>
#   pnpm index:production    --source <key>
#   pnpm retrieve:production --source <key> "<a representative query>"
#   pnpm eval:production     --source <key>
#
# See docs/ops/prod-ingest.md for the full runbook.
#
# This file is **auto-maintained by /slice** at stage boundaries — it mirrors
# what /slice already tracks in `docs/slices/<key>.md`. Do not hand-edit during
# a slice; let the skill keep it consistent with git. The verbose narrative
# tracker lives at `docs/sources.md` and serves a different purpose (it
# captures findings, learnings, eval results, blockers in prose).
#
# Field reference:
#   status:      in-progress | blocked | done | deferred
#   stages:      pending | green | red   (mirrors /slice's 4 stages)
#   slice_file:  path to the slice file (the durable per-source record)
#   blocker:     short reason, only when status: blocked
#   last_updated: YYYY-MM-DD

