# Source status — the at-a-glance lookup for the *:production scripts.
#
# Open this file, find a language whose four `stages` are green, copy the row
# key, run:
#   pnpm acquire:production  --source <key>
#   pnpm index:production    --source <key>
#   pnpm retrieve:production --source <key> "<a representative query>"
#   pnpm eval:production     --source <key>
#
# See docs/ops/prod-ingest.md for the full runbook.
#
# This file is **auto-maintained by /slice** at stage boundaries (it mirrors
# what /slice tracks in `docs/slices/<key>.md`). Do NOT hand-edit it — mutate it
# only through the deterministic writer (the sole sanctioned mutator), which
# validates every write against src/contracts/source-status.schema.ts and
# derives the top-level `status` so it can't disagree with the per-language
# state. The verbose narrative tracker lives at `docs/sources.md`.
#
# Field reference (the contract: src/contracts/source-status.schema.ts):
#   status:       in-progress | blocked | done | deferred
#                 DERIVED from the languages below — never hand-set.
#                 Rollup precedence: blocked > in-progress > deferred > done;
#                 a row is `done` only when EVERY language is `done`.
#   languages:    one entry per language code (en, es, fr, zh, …). Single-
#                 language sources carry a lone entry. Each entry has:
#     status:     in-progress | blocked | done | deferred  (this language)
#     stages:     acquire/ingest/retrieve/evaluate, each pending | green | red
#     scope:      optional — e.g. "us-latinos (1 page)"
#     blocker:    required only when this language's status is blocked
#     note:       optional — e.g. "pending embedder-model swap"
#   slice_file:   path to the slice file (the durable per-source record)
#   last_updated: YYYY-MM-DD  (bumped by the tool on every write)

sources:
  starting-with-god:
    name: Starting With God
    status: done
    languages:
      en:
