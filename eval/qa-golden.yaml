# Hand-authored QA pairs for the corpus. Each case is a SOURCE-AGNOSTIC question
# plus a `relevant` map of {sourceKey: [doc pathnames]} — every document, across
# sources, that legitimately answers it. A top-k hit is judged correct if its
# doc pathname matches ANY path in the relevant set. Doc-path matching survives
# re-indexing (it doesn't depend on chunk-id stability).
#
# Schema (consumed by scripts/eval.ts):
#
#   cases:
#     - id: short-stable-id            # required, unique
#       question: "natural-language question"   # required
#       relevant:                      # required; >=1 source, each with >=1 path
#         starting-with-god:
#           - "/path/one.html"
#         cru-10-basic-steps:
#           - "/us/en/.../lesson.html"
#
# `pnpm eval` reports recall@3 / recall@10 / COVERAGE (fraction of the relevant
# set returned) + per-source coverage; P@1/MRR are secondary (ranking is the
# consumer's job — docs/eval-approach.md). `pnpm eval --source <key>` runs the
# cases whose relevant set includes that source (still whole-corpus retrieval).
#
# The relevant set is LIVING: when a new source is ingested, RE-REVIEW these
# questions and extend their relevant sets with any newly-relevant docs — don't
# only add new questions. ids keep historical swg-/cru- prefixes but questions
# are source-agnostic. Off-topic NEGATIVES live in the slice files (eval.ts would
# miscount them as misses), not here.

cases:
  - id: swg-seeker-anxiety
    question: "My mind races with anxiety constantly and I can't switch it off — is there a way to actually find peace?"
    relevant:
      starting-with-god:
        - "/questions/how-to-stop-worrying.html"
        - "/struggles/into-negative.html"
        - "/bible-study/what-to-do-with-problems.html"
      jesusfilm-org:
